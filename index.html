<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. King's Super Grand Piano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; overflow: hidden; user-select: none; touch-action: manipulation; }
        .piano-key { transition: transform 0.08s ease, filter 0.08s ease, box-shadow 0.08s ease; position: relative; cursor: pointer; }
        .piano-key:active, .piano-key.active-playing { transform: translateY(6px); filter: brightness(1.15); }
        .white-key { background: linear-gradient(to bottom, #ffffff 0%, #f1f5f9 100%); border: 2px solid #cbd5e1; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; height: 260px; width: 75px; z-index: 1; margin-right: -2px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .white-key .note-label { font-weight: 900; font-size: 2rem; color: #1e293b; }
        .black-key { background: linear-gradient(to bottom, #0f172a 0%, #1e293b 100%); border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; height: 160px; width: 48px; margin-left: -24px; margin-right: -24px; z-index: 2; border: 1px solid #000; box-shadow: 0 8px 10px rgba(0, 0, 0, 0.4); }
        .target { border: 5px solid #ef4444 !important; box-shadow: 0 0 25px #ef4444 !important; }
        .success { border: 5px solid #22c55e !important; box-shadow: 0 0 25px #22c55e !important; }
        #dino { font-size: 80px; transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
        .celebrating { animation: jump-bounce 0.5s infinite; }
        @keyframes jump-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
        .zoom-pulse { animation: zoom-slow 4s infinite ease-in-out; }
        @keyframes zoom-slow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-end pb-8">

    <div id="game-ui" class="absolute top-4 bg-slate-900/90 border border-slate-700/50 p-4 rounded-2xl shadow-2xl text-center max-w-sm w-11/12 z-50 backdrop-blur-md">
        <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Select Song</span>
            <span id="progress-text" class="text-xs font-bold text-emerald-400">Note 1 of 42</span>
        </div>
        <select id="song-select" class="w-full bg-slate-800 text-white font-black text-lg py-2 px-3 rounded-xl border border-slate-700 mb-3" onchange="loadSong()">
            <option value="baa">Baa Baa Black Sheep</option>
            <option value="brother">Brother John</option>
            <option value="happy">Happy Birthday to You</option>
            <option value="mary">Mary Had a Little Lamb</option>
        </select>
        <button id="mic-btn" class="w-full py-2 mb-3 bg-blue-600 text-white font-black rounded-xl hover:bg-blue-500 transition-colors" onclick="toggleMic()">🎤 Start Mic</button>
        <div class="p-2 bg-slate-800/50 rounded-xl">
            <p id="instruction" class="text-base font-bold text-slate-200">Hit the Red Note!</p>
        </div>
        <div id="party-message" class="hidden mt-4">
            <p class="text-3xl font-black text-yellow-400 animate-bounce mb-2">YOU DID IT SEBA !!!</p>
            <img src="image_0c101e.jpg" class="mx-auto mt-2 w-72 h-72 rounded-full border-4 border-yellow-400 shadow-lg zoom-pulse" alt="Seba">
        </div>
        <button id="reset-party-btn" class="hidden mt-3 w-full py-2 bg-emerald-500 text-white font-black rounded-xl" onclick="resetGameAfterParty()">Play Another Song! 🔄</button>
    </div>

    <div id="dino-container" class="absolute top-[25%] left-[5%] w-[100px] h-[500px] z-10 flex flex-col justify-end items-center pointer-events-none">
        <div id="dino">🦖</div>
    </div>
    
    <div id="piano" class="bg-slate-950 p-6 rounded-[32px] shadow-2xl flex border-t-8 border-slate-800"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMicActive = false, isPartyActive = false, currentSong = [], currentStep = 0;
        
        const notes = [
            {note:'C', freq:261.63, type:'white'}, {note:'', freq:277.18, type:'black'}, {note:'D', freq:293.66, type:'white'}, {note:'', freq:311.13, type:'black'}, {note:'E', freq:329.63, type:'white'}, {note:'F', freq:349.23, type:'white'}, {note:'', freq:369.99, type:'black'}, {note:'G', freq:392.00, type:'white'}, {note:'', freq:415.30, type:'black'}, {note:'A', freq:440.00, type:'white'}, {note:'', freq:466.16, type:'black'}, {note:'B', freq:493.88, type:'white'}
        ];
        
        const songs = {
            baa: ['C','C','G','G','A','A','G','F','F','E','E','D','D','C','G','G','F','F','E','E','D','G','G','F','F','E','E','D','C','C','G','G','A','A','G','F','F','E','E','D','D','C'],
            brother: ['C','D','E','C','C','D','E','C','E','F','G','E','F','G','G','A','G','F','E','C','G','A','G','F','E','C','C','G','C','C','G','C'],
            happy: ['C','C','D','C','F','E','C','C','D','C','G','F','C','C','C','A','F','E','D','A','A','F','G','F'],
            mary: ['E','D','C','D','E','E','E','D','D','D','E','G','G','E','D','C','D','E','E','E','E','D','D','E','D','C']
        };

        const piano = document.getElementById('piano');
        const keyElements = [];

        notes.forEach((key, i) => {
            const btn = document.createElement('div');
            btn.className = `piano-key ${key.type === 'white' ? 'white-key' : 'black-key'}`;
            if (key.type === 'white') { const label = document.createElement('span'); label.className = 'note-label'; label.innerText = key.note; btn.appendChild(label); }
            btn.dataset.note = key.note;
            btn.addEventListener('mousedown', () => playKey(key, i));
            piano.appendChild(btn);
            keyElements.push(btn);
        });

        function playGrandTone(freq, duration = 1.5) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            [1, 2.01, 3.05, 4.1].forEach((h, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = i === 0 ? 'triangle' : 'sine';
                osc.frequency.value = freq * h;
                const v = (0.2 / (i + 1));
                gain.gain.setValueAtTime(v, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + duration);
            });
        }

        function loadSong() {
            isPartyActive = false;
            currentSong = songs[document.getElementById('song-select').value];
            currentStep = 0;
            document.getElementById('reset-party-btn').classList.add('hidden');
            document.getElementById('party-message').classList.add('hidden');
            document.getElementById('instruction').classList.remove('hidden');
            document.getElementById('dino-container').classList.remove('hidden');
            document.getElementById('dino').classList.remove('celebrating');
            updateTarget();
        }

        function updateTarget() {
            keyElements.forEach(el => el.classList.remove('target', 'success'));
            if (currentStep < currentSong.length) keyElements.forEach(el => { if (el.dataset.note === currentSong[currentStep]) el.classList.add('target'); });
            document.getElementById('progress-text').innerText = `Note ${currentStep + 1} of ${currentSong.length}`;
        }

        function playKey(key, index) {
            if (isPartyActive) return;
            const element = keyElements[index];
            element.classList.add('active-playing');
            setTimeout(() => element.classList.remove('active-playing'), 150);
            
            if (key.note !== "" && key.note === currentSong[currentStep]) {
                element.classList.add('success');
                currentStep++;
                if (currentStep >= currentSong.length) startParty();
                else setTimeout(updateTarget, 250);
            }
            playGrandTone(key.freq);
            document.getElementById('dino').style.transform = `translateY(-${index * 20}px)`;
        }

        function startParty() {
            isPartyActive = true;
            document.getElementById('reset-party-btn').classList.remove('hidden');
            document.getElementById('party-message').classList.remove('hidden');
            document.getElementById('instruction').classList.add('hidden');
            document.getElementById('dino').classList.add('celebrating');
            playSaintsFanfare();
        }

        function playSaintsFanfare() {
            const chords = [261.6, 329.6, 392.0, 440.0, 392.0, 329.6, 261.6];
            let step = 0;
            const interval = setInterval(() => {
                if (!isPartyActive) { clearInterval(interval); return; }
                const freq = chords[step % chords.length];
                playGrandTone(freq, 0.8);
                step++;
                if (step >= 20) clearInterval(interval);
            }, 250);
        }

        function resetGameAfterParty() { location.reload(); }
        
        async function toggleMic() {
            if (isMicActive) { location.reload(); return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const analyzer = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyzer);
                analyzer.fftSize = 2048;
                isMicActive = true;
                document.getElementById('mic-btn').innerText = "✅ Mic Listening...";
                const buffer = new Float32Array(analyzer.fftSize);
                const detect = () => {
                    if (!isMicActive) return;
                    analyzer.getFloatTimeDomainData(buffer);
                    requestAnimationFrame(detect);
                };
                detect();
            } catch (e) { alert("Mic access denied"); }
        }

        loadSong();
    </script>
</body>
</html>
